container:
  image:       ubuntu:22.04
  working_dir: /workspace/micro-saas
  env:
    TASK_ENV: sandbox
  volumes: []
  packages:
    apt: ["nodejs", "npm", "sqlite3"]
    pip: []
    npm: ["express", "better-sqlite3", "cors", "bcrypt", "jsonwebtoken", "react", "react-dom", "vite"]
  setup_script: |
    mkdir -p /workspace/micro-saas/server /workspace/micro-saas/frontend && cd /workspace/micro-saas/server && npm init -y && npm install express better-sqlite3 cors bcrypt jsonwebtoken && cd /workspace/micro-saas/frontend && npm init -y && npm install react react-dom vite

task:
  instruction: |
    You are building a Micro SaaS application: a User Management API with a React dashboard.
    
    A scaffolded project exists at /workspace/micro-saas/ with:
      • /workspace/micro-saas/server/  — Express backend (dependencies installed)
      • /workspace/micro-saas/frontend/ — React + Vite frontend (dependencies installed)
    
    DO NOT run npm install again.
    
    ── WHAT TO BUILD ──────────────────────────────────────────
    
    BACKEND (Express server on port 4000):
    1. Create /workspace/micro-saas/server/db.js — initialize SQLite database at /workspace/micro-saas/server/users.db with a table `users` (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL, email TEXT UNIQUE NOT NULL, password TEXT NOT NULL, role TEXT DEFAULT 'user', created_at TEXT DEFAULT (datetime('now'))).
    2. Create /workspace/micro-saas/server/server.js — Express app that:
       - Serves on port 4000
       - Uses CORS
       - POST /api/register — accepts {name, email, password}, hashes password with bcrypt, inserts user, returns {id, name, email, role}
       - POST /api/login — accepts {email, password}, verifies bcrypt hash, returns JWT token (secret: 'benchb0t-secret') with payload {userId, role}
       - GET /api/users — requires JWT in Authorization header (Bearer <token>), returns all users from DB (excluding password field)
       - GET /api/users/:id — requires JWT, returns single user (excluding password)
       - PUT /api/users/:id — requires JWT with role 'admin', updates name/email/role
       - DELETE /api/users/:id — requires JWT with role 'admin', deletes user
       - GET /api/health — returns {status: 'ok', uptime: process.uptime()}
    
    FRONTEND (React + Vite on port 5173):
    3. Create /workspace/micro-saas/frontend/src/App.jsx — React app with:
       - Login form (email + password) that calls POST /api/login and stores JWT in localStorage
       - After login, fetches GET /api/users (with JWT) and displays a table of users
       - "Register" button that opens a modal/form to create a new user via POST /api/register
       - Delete button per row that calls DELETE /api/users/:id (admin only)
       - Logout button that clears
  context: null
  max_turns:  20
  timeout_s:  120

