level:
  id:         l-tatto-studio
  name:       "Tattoo Studio"
  difficulty: 5
  category:   webapp
  tags:       [react, vite, webapp, creative, ui]
  deprecated: true
  replaced_by: l9-tattoo-studio

container:
  image:       node:20-slim
  working_dir: /workspace
  env:
    TASK_ENV: sandbox
  volumes: []
  packages:
    apt: [curl]
    pip: []
    npm: []
  setup_script: |
    set -e
    mkdir -p /workspace/tattoo-studio/src /workspace/tattoo-studio/public

    # --- package.json ---
    cat > /workspace/tattoo-studio/package.json << 'PKGJSON'
    {
      "name": "tattoo-studio",
      "version": "1.0.0",
      "type": "module",
      "scripts": {
        "dev": "vite",
        "build": "vite build"
      },
      "dependencies": {
        "react": "^18.2.0",
        "react-dom": "^18.2.0"
      },
      "devDependencies": {
        "@vitejs/plugin-react": "^4.2.0",
        "vite": "^5.0.0"
      }
    }
    PKGJSON

    # --- vite.config.js (host+port pre-configured — agent must NOT change this) ---
    cat > /workspace/tattoo-studio/vite.config.js << 'VITECFG'
    import { defineConfig } from 'vite'
    import react from '@vitejs/plugin-react'
    export default defineConfig({
      plugins: [react()],
      server: {
        host: '0.0.0.0',
        port: 3000
      }
    })
    VITECFG

    # --- index.html ---
    cat > /workspace/tattoo-studio/index.html << 'IDXHTML'
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tattoo Studio</title>
      </head>
      <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
      </body>
    </html>
    IDXHTML

    # --- src/main.jsx ---
    printf 'import React from "react"\nimport ReactDOM from "react-dom/client"\nimport App from "./App.jsx"\nReactDOM.createRoot(document.getElementById("root")).render(<React.StrictMode><App /></React.StrictMode>)\n' > /workspace/tattoo-studio/src/main.jsx

    # --- src/App.jsx placeholder (agent will replace this) ---
    printf 'export default function App() { return <div><h1>Tattoo Studio — scaffold ready</h1></div> }\n' > /workspace/tattoo-studio/src/App.jsx

    # install deps
    cd /workspace/tattoo-studio && npm install

preview:
  port: 3000
  path: "/"

task:
  instruction: |
    You are a Senior React Developer specialising in award-winning, visually stunning web apps.

    A React + Vite project has already been scaffolded for you at /workspace/tattoo-studio/.
    Dependencies are installed. DO NOT run npm install again.

    ── WHAT TO BUILD ──────────────────────────────────────────────────
    Replace /workspace/tattoo-studio/src/App.jsx with a complete,
    beautiful single-page Tattoo Studio website. You may create
    additional files under src/ (components, styles) as needed.

    The site must include:
    • Hero section — dramatic dark aesthetic (black / gold / crimson),
      studio name, tagline, and a "Book Now" call-to-action button
    • Gallery grid — showcase at least 4 tattoo styles with style cards
      (Traditional, Realism, Geometric, Blackwork)
    • Artists section — 2–3 artist cards with name, specialty, bio
    • Contact / Booking form — name, email, message, submit button
    • Smooth CSS transitions / hover effects
    • Fully inline styles (no external CSS files or CDN imports needed)

    ── HOW TO START THE SERVER ─────────────────────────────────────────
    The vite.config.js is already configured to bind to 0.0.0.0:3000.
    DO NOT change the server config.

    After writing the UI, start the dev server in the background:
      cd /workspace/tattoo-studio && npm run dev &

    Then wait 4 seconds and verify it is running:
      sleep 4 && curl -sf http://localhost:3000/

    ── IMPORTANT RULES ─────────────────────────────────────────────────
    • Server MUST bind to 0.0.0.0 (already set in vite.config.js — leave it)
    • MUST start server with & so it runs in the background
    • MUST verify with curl before declaring done
    • No external image URLs — use CSS gradients/shapes as placeholders
  context: null
  max_turns:  30
  timeout_s:  300

modes:
  guided:
    system_prompt: |
      You are a step-by-step React frontend engineer agent in a Docker sandbox.
      Vite + React are pre-installed at /workspace/tattoo-studio/. Do NOT run npm install.

      APPROACH:
      1. list_dir /workspace/tattoo-studio/src  — see the scaffold
      2. write_file /workspace/tattoo-studio/src/App.jsx  — full tattoo studio UI
         (you may also create additional files under src/)
      3. run_background  command="cd /workspace/tattoo-studio && npm run dev"  wait_seconds=6
         OR: bash: cd /workspace/tattoo-studio && npm run dev &
      4. bash: sleep 5 && curl -sf http://localhost:3000/

      HINTS:
      • The vite.config.js already sets host:'0.0.0.0' and port:3000 — do NOT change it
      • All styles should be inline (no external CSS, no CDN)
      • Use dark aesthetic: background #0a0a0a, accents in gold/crimson
      • Components: Hero, Gallery, Artists, ContactForm
      • Start the server with & or run_background AFTER writing all files

      When done, confirm the server is running at http://localhost:3000.
  unguided:
    system_prompt: |
      You are a capable React frontend engineer agent. Complete the assigned task.
      When done, respond with a plain text summary.

tools:
  - bash
  - write_file
  - read_file
  - run_background

evaluation:
  type:              script
  efficiency_target: 12
  criteria:
    - id:          server_responds
      description: "Vite dev server responds on port 3000"
      type:        script
      check:       "curl -sf http://localhost:3000/"
      weight:      3.0
    - id:          app_jsx_has_tattoo_content
      description: "App.jsx contains tattoo studio content"
      type:        script
      check:       "grep -qi 'tattoo\\|studio\\|ink\\|artist' /workspace/tattoo-studio/src/App.jsx"
      weight:      1.5
    - id:          has_component_structure
      description: "App.jsx has meaningful component depth (3+ functions or arrow components)"
      type:        script
      check:       "[ $(grep -cE 'function [A-Z]|const [A-Z][a-zA-Z]+ = ' /workspace/tattoo-studio/src/App.jsx) -ge 3 ]"
      weight:      1.0
    - id:          has_gallery_or_section
      description: "App contains a gallery or section structure"
      type:        script
      check:       "grep -qi 'gallery\\|section\\|artist\\|style' /workspace/tattoo-studio/src/App.jsx"
      weight:      0.5
