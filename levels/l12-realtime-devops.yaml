level:
  id:         l12-realtime-devops
  name:       "Realtime DevOps Dashboard"
  difficulty: 5
  category:   fullstack
  tags:       ["realtime", "websocket", "database", "docker", "devops"]

container:
  image:       node:20-bookworm
  working_dir: /workspace/realtime-devops
  env:
    TASK_ENV: sandbox
  volumes: []
  packages:
    apt: []
    pip: []
    npm: ["express", "ws", "better-sqlite3", "react", "react-dom", "vite", "recharts", "tailwindcss", "postcss", "autoprefixer"]
  setup_script: |
    mkdir -p /workspace/realtime-devops && cd /workspace/realtime-devops && npx create-vite@latest frontend --template react 2>/dev/null || true

preview:
  port: 3001
  path: "/"

task:
  instruction: |
    You are building a Realtime DevOps Dashboard — a full-stack application with WebSocket-based live metrics, SQLite persistence, and Docker-aware status monitoring.
    
    A scaffolded project exists at /workspace/realtime-devops/ with:
      • /workspace/realtime-devops/server/ — Express backend
      • /workspace/realtime-devops/frontend/ — Vite + React frontend
    
    Dependencies are already installed. DO NOT run npm install or npx create-vite again.
    
    ── WHAT TO BUILD ────────────────────────────────────────────────────────────
    
    ### BACKEND (server/)
    
    Create an Express server at /workspace/realtime-devops/server/server.js that:
    
    1. **REST API Endpoints:**
       - `GET /api/status` — returns `{ status: "ok", uptime: <process.uptime()>, version: "1.0.0" }`
       - `POST /api/deploy` — accepts JSON `{ service: string, tag: string }`, writes a deploy log entry to SQLite, broadcasts via WebSocket, returns `{ success: true, id: <uuid> }`
       - `GET /api/deploys` — returns all deploy log entries from SQLite as JSON array
       - `GET /api/metrics/cpu` — returns simulated CPU metrics: `{ current: <random 10-90>, history: [10 latest numbers] }`
       - `GET /api/metrics/memory` — returns simulated memory metrics: `{ used: <random 100-800>, total: 1024, percent: <computed> }`
    
    2. **WebSocket Server (ws library):**
       - Listen on the same port (upgrade path `/ws`)
       - On connection, send a welcome message: `{ type: "welcome", clientId: <random string> }`
       - Every 2 seconds, broadcast a heartbeat to all clients: `{ type: "heartbeat", timestamp: <ISO string>, cpu: <random 10-90>, memory: <random 100-800> }`
       - When a deploy event occurs (POST /api/deploy), broadcast `{ type: "deploy", service, tag, timestamp }` to all connected clients
    
    3. **SQLite Database (better-sqlite3):**
       - Database file: /workspace/realtime-devops/data/deployments.db (create directory if missing)
       - Table `deployments` with columns: `id TEXT PRIMARY KEY, service TEXT, tag TEXT, deployed_at TEXT, status TEXT DEFAULT 'pending'`
       - On startup, ensure the table exists
    
    4. **Static File Serving:**
       - Serve the built frontend from /workspace/realtime-devops/frontend/dist/ at `/`
       - Serve the Vite dev proxy for development (if dist doesn't exist, proxy to localhost:5173)
    
    ### FRONTEND (frontend/)
    
    Create a React app at /workspace/realtime-devops/frontend/ that:
    
    1. **Main Dashboard View** (`src/App.jsx`):
       - Connects to WebSocket at `ws://localhost:<port>/ws` (port from env `PORT` or 3001)
       - Displays a real-time heartbeat indicator (green dot that flashes on each heartbeat)
       - Shows live CPU gauge (recharts RadarChart or custom SVG) updating from heartbeat data
       - Shows live Memory bar (recharts BarChart or custom SVG) updating from heartbeat data
       - A deploy history table that updates when a `deploy` event arrives via WebSocket
       - A "New Deploy" form with fields: service (text), tag (text), and a submit button that POSTs to `/api/deploy`
    
    2. **Styling:**
       - Use Tailwind CSS for layout
       - Dark theme by default (bg-gray-900, text-white, accent-green-500)
       - Responsive grid layout: metrics on top row (2 columns), deploy form + history below
    
    3. **Vite Config:**
       - Proxy `/api` and `/ws` to `http://localhost:3001` in `vite.config.js`
    
    ### DATA FLOW
    
    1. User opens the dashboard → sees live CPU/memory gauges updating every 2s via WebSocket
    2. User fills in "New Deploy" form → POST /api/deploy → SQLite insert + WebSocket broadcast
    3. Deploy history table updates instantly without page reload
    4. On page refresh, GET /api/deploys loads persisted history from SQLite
    
    ── CRITERIA ────────────────────────────────────────────────────────────────
    
    Your submission will be evaluated on:
    1. Backend health: server responds on the configured port
    2. WebSocket connectivity: client receives welcome + heartbeat messages
    3. Deploy API works: POST /api/deploy returns 200 with valid JSON, writes to SQLite
    4. Deploy persistence: GET /api/deploys returns at least one entry after a deploy
    5. Frontend renders: the dashboard HTML contains metric elements and deploy form
    6. Real-time updates: deploy events appear in the frontend without page reload
    7. Static serving: frontend is served by Express in production mode
    8. Dark theme: the page uses dark background colors
  context: null
  max_turns:  40
  timeout_s:  300

tools:
  - bash
  - http_request
  - list_dir
  - patch_file
  - read_file
  - run_background
  - write_file

evaluation:
  type:              script
  efficiency_target: 25
  criteria:
    - id:          backend_health
      description: "Backend server responds on the configured port with status 200"
      type:        script
      check:       "curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/status"
      weight:      1.0
    - id:          websocket_connectivity
      description: "WebSocket client receives welcome message and at least one heartbeat within 10s"
      type:        script
      check:       "timeout 10 bash -c 'node -e \"const WebSocket=require('ws');const c=new WebSocket('ws://localhost:3001/ws');c.on('message',d=>{const m=JSON.parse(d);if(m.type==='welcome'){console.log('WELCOME_OK');}if(m.type==='heartbeat'){console.log('HEARTBEAT_OK');process.exit(0);}});c.on('error',e=>{console.log('WS_ERR');process.exit(1);});\" 2>&1 | grep -E 'WELCOME_OK|HEARTBEAT_OK'"
      weight:      1.0
    - id:          deploy_api_works
      description: "POST /api/deploy returns 200 with valid JSON containing success and id"
      type:        script
      check:       "curl -s -X POST http://localhost:3001/api/deploy -H 'Content-Type: application/json' -d '{\"service\":\"nginx\",\"tag\":\"1.25\"}' | grep -E '\"success\":true'"
      weight:      1.0
    - id:          deploy_persistence
      description: "GET /api/deploys returns at least one entry after a deploy"
      type:        script
      check:       "curl -s http://localhost:3001/api/deploys | grep -E '\"service\"'"
      weight:      1.0
    - id:          frontend_renders
      description: "Frontend HTML contains metric elements and deploy form"
      type:        script
      check:       "curl -s http://localhost:3001/ 2>/dev/null | grep -E '(cpu|memory|deploy|metric|gauge|chart)'"
      weight:      1.0
    - id:          realtime_updates
      description: "Deploy events appear in frontend without page reload (WebSocket broadcast verified)"
      type:        script
      check:       "timeout 10 bash -c 'node -e \"const WebSocket=require('ws');const c=new WebSocket('ws://localhost:3001/ws');c.on('message',d=>{const m=JSON.parse(d);if(m.type==='deploy'){console.log('DEPLOY_BROADCAST_OK');process.exit(0);}});setTimeout(()=>{console.log('TIMEOUT');process.exit(1)},8000);\" & sleep 1 && curl -s -X POST http://localhost:3001/api/deploy -H 'Content-Type: application/json' -d '{\"service\":\"test\",\"tag\":\"v1\"}' >/dev/null; wait 2>/dev/null; true' 2>&1 | grep -E 'DEPLOY_BROADCAST_OK'"
      weight:      1.0
    - id:          static_serving
      description: "Frontend static files are served by Express in production mode"
      type:        script
      check:       "curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/ 2>/dev/null | grep -E '200'"
      weight:      1.0
    - id:          dark_theme
      description: "The page uses dark background colors (bg-gray-900 or similar)"
      type:        script
      check:       "curl -s http://localhost:3001/ 2>/dev/null | grep -E 'bg-gray-900|bg-gray-800|bg-slate-900|bg-black|dark'"
      weight:      1.0

forced_retry:
  enabled:              true
  max_retries:          2
  penalty_per_retry:    0.15
  completion_threshold: 0.5
