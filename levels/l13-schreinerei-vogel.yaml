tools:
  - bash
  - list_dir
  - read_file
  - write_file
  - patch_file
  - run_background

evaluation:
  type:              script
  efficiency_target: 8
  criteria:
    - id:          frontend_responds
      description: "The Vite dev server responds on port 5173"
      type:        script
      check:       "curl -s -o /dev/null -w '%{http_code}' http://localhost:5173/ 2>/dev/null | grep -q 200"
      weight:      1.0
    - id:          app_renders_workshop_name
      description: "The page renders 'Schreinerei Vogel' as the workshop name"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -q 'Schreinerei Vogel'"
      weight:      1.0
    - id:          service_cards_exist
      description: "At least 4 service cards are rendered"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(Möbelbau|Küchenbau|Treppenbau|Fenster|Restauration|Sonderanfertigungen)' | xargs -I n test n -ge 4"
      weight:      1.0
    - id:          gallery_section_exists
      description: "Gallery section with at least 4 project entries"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(Eichenholz|Massivholz|Ahorn|Nussbaum|Kiefer|Buche|Projekt)' | xargs -I n test n -ge 4"
      weight:      1.0
    - id:          contact_form_exists
      description: "Contact form with Name, Email, Nachricht fields"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(Name|Email|Nachricht|Telefon)' | xargs -I n test n -ge 3"
      weight:      1.0
    - id:          theme_toggle_works
      description: "Dark/light theme toggle is present and functional"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(theme|dark|light|toggle|mode)' | xargs -I n test n -ge 1"
      weight:      1.0
    - id:          animated_counters_exist
      description: "Animated counters in a stats section"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(500|30|8|Projekte|Jahre|Meister|Erfahrung)' | xargs -I n test n -ge 3"
      weight:      1.0
    - id:          smooth_scroll_nav
      description: "Smooth scroll navigation links exist"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(scroll|nav|Navigation|href.*#)' | xargs -I n test n -ge 1"
      weight:      1.0
    - id:          modal_or_lightbox
      description: "Modal/lightbox interaction exists for services or gallery"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(modal|lightbox|overlay|dialog|popup|open|close)' | xargs -I n test n -ge 1"
      weight:      1.0
    - id:          warm_wood_palette
      description: "The design uses warm wood/earth tone palette (not default blue/gray)"
      type:        script
      check:       "curl -s http://localhost:5173/ 2>/dev/null | grep -c -E '(amber|brown|wood|#783|#4a2|#8B45|#d9|#a05|#6B3|#c9|#7B4|#9C6|#8B5|#a5|#d4)' | xargs -I n test n -ge 1"
      weight:      1.0

forced_retry:
  enabled:              true
  max_retries:          2
  penalty_per_retry:    0.3
  completion_threshold: 0.5
