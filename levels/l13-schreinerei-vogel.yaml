task:
  instruction: |
    You are a Senior React Developer specialising in award-winning, visually stunning artisan business websites.
    
    A Vite + React project has been scaffolded at /workspace/schreinerei-vogel/.
    Dependencies (react, react-dom, vite, @vitejs/plugin-react, tailwindcss, @tailwindcss/vite, recharts, lucide-react) are already installed in /workspace/schreinerei-vogel/frontend/.
    
    ── WHAT TO BUILD ──────────────────────────────────────────
    
    Build a beautiful, production-quality frontend-only webapp for **Schreinerei Vogel** — a traditional German carpentry / woodworking workshop. The app must be a single-page React application served via Vite.
    
    Requirements:
    
    1. **Design & Theme**:
       - Warm, handcrafted aesthetic — use a wood/earth tone color palette (amber, brown, cream, dark oak).
       - Use Tailwind CSS for styling. Custom CSS variables for the wood theme are acceptable.
       - The design must feel premium, artisan, and modern — think "high-end woodworking atelier".
    
    2. **Pages / Sections** (all in one SPA with smooth scroll or tab navigation):
       - **Hero / Header**: Workshop name "Schreinerei Vogel", subtitle "Meisterhaftes Holzhandwerk seit 1987", a warm hero image placeholder (use a styled div with wood texture gradient).
       - **Services**: Cards showing services (Möbelbau, Küchenbau, Treppenbau, Fenster & Türen, Restauration, Sonderanfertigungen) with icons and descriptions.
       - **Gallery / Portfolio**: A masonry-style grid of workshop projects (use placeholder images with wood-themed colored blocks showing project names like "Eichenholz-Tisch", "Massivholz-Küche", "Treppe aus Ahorn", etc.).
       - **Team**: A team section showing 3-4 artisans with name, role, and a short bio.
       - **Contact**: A contact form with fields: Name, Email, Telefon, Nachricht. On submit, show a success toast/message (no actual POST required — just UI feedback).
       - **Footer**: With imprint-style info, address, phone, email, and social icons.
    
    3. **Interactivity**:
       - Smooth scroll navigation (nav links scroll to sections).
       - A sticky header that shrinks on scroll.
       - Service cards should be clickable — clicking one opens a modal/overlay with a longer description.
       - Gallery items should have a lightbox effect (click to enlarge).
       - Contact form must validate (email format, required fields) and show inline validation errors.
       - A dark/light theme toggle (warm wood vs dark wood) using Tailwind's dark mode class strategy.
       - Animated counters in the hero or stats section (e.g. "Über 500 Projekte", "30+ Jahre Erfahrung", "8 Meister" — numbers animate on scroll into view).
       - Page load entrance animations for sections (fade-in/stagger).
    
    4. **Technical**:
       - All components in /workspace/schreinerei-vogel/frontend/src/.
       - Use functional components with hooks.
       - Use Tailwind CSS classes extensively — no separate CSS files except for minimal custom theme variables.
       - vite.config.js must be configured with the Tailwind plugin.
       - The app must run with `npm run dev` in the frontend directory and serve on port 5173.
       - No backend, no database, no API calls — pure frontend.
    
    5. **Criteria checks** (the app will be verified by):
       - The dev server responds on port 5173.
       - The page renders the workshop name "Schreinerei Vogel".
       - Service cards exist with at least 4 services.
       - Gallery section exists with at least 4 project entries.
       - Contact form exists with Name, Email, Nachricht fields.
       - Theme toggle works (dark/light mode).
       - Animated counters exist in a stats section.
       - Smooth scroll navigation works.
       - Modal/lightbox interaction works for services or gallery.
       - The design uses a warm wood/earth tone palette (not default blue/gray).
    
    ── WHAT IS PROVIDED ──────────────────────────────────────
    
    The scaffolded project at /workspace/schreinerei-vogel/ contains:
      /workspace/schreinerei-vogel/frontend/package.json
      /workspace/schreinerei-vogel/frontend/vite.config.js
      /workspace/schreinerei-vogel/frontend/index.html
      /workspace/schreinerei-vogel/frontend/src/main.jsx
      /workspace/schreinerei-vogel/frontend/src/App.jsx (minimal starter)
      /workspace/schreinerei-vogel/frontend/src/index.css (minimal Tailwind imports)
    
    DO NOT install additional npm packages beyond what is already provided. Use only the dependencies already listed in package.json.
    
    ── OUTPUT ─────────────────────────────────────────────────
    
    After completing the implementation, the frontend dev server must be running and serving the complete Schreinerei Vogel webapp. The app must pass all criteria checks listed above.
